<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | ApnaKart</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    .checkout-wrap { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
    .checkout-wrap h2 { font-size: 22px; font-weight: 700; color: #1e3c72; margin-bottom: 24px; text-align: center; }
    .checkout-steps { display: flex; justify-content: center; gap: 8px; margin-bottom: 28px; }
    .co-step { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: #aaa; }
    .co-step.active { color: #1e3c72; }
    .co-step-circle { width: 26px; height: 26px; border-radius: 50%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #aaa; }
    .co-step.active .co-step-circle { background: #1e3c72; color: #fff; }
    .co-step-line { width: 40px; height: 2px; background: #f1f5f9; margin: 0 4px; }
    .checkout-layout { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }
    .checkout-form-box { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 28px; }
    .checkout-form-box h3 { font-size: 16px; font-weight: 700; color: #1e3c72; margin: 0 0 18px; display: flex; align-items: center; gap: 8px; }
    .co-field { margin-bottom: 18px; }
    .co-field label { display: block; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .co-field textarea, .co-field input { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: 'Poppins', sans-serif; background: #f8faff; box-sizing: border-box; transition: border 0.2s; }
    .co-field textarea:focus, .co-field input:focus { outline: none; border-color: #1e3c72; background: #fff; }
    .co-field textarea { resize: vertical; min-height: 80px; }
    .payment-options { display: flex; flex-direction: column; gap: 10px; }
    .pay-option { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
    .pay-option:hover { border-color: #1e3c72; background: #f8faff; }
    .pay-option input { display: none; }
    .pay-option .pay-icon { font-size: 18px; color: #1e3c72; width: 24px; text-align: center; }
    .pay-option span.pay-text { font-size: 14px; font-weight: 600; color: #333; }
    .checkout-summary { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 22px; position: sticky; top: 20px; }
    .checkout-summary h3 { font-size: 16px; font-weight: 700; color: #1e3c72; margin: 0 0 16px; }
    .co-summary-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f8fafc; }
    .co-summary-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
    .co-summary-item-info { flex: 1; min-width: 0; }
    .co-summary-item-info h5 { font-size: 12px; font-weight: 600; margin: 0 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .co-summary-item-info span { font-size: 11px; color: #888; }
    .co-summary-item-price { font-size: 13px; font-weight: 700; color: #1e3c72; white-space: nowrap; }
    .summary-row { display: flex; justify-content: space-between; font-size: 13px; color: #555; margin: 10px 0; }
    .summary-row.total { font-size: 16px; font-weight: 700; color: #1e293b; border-top: 1px solid #f1f5f9; padding-top: 12px; }
    .summary-row .free { color: #059669; font-weight: 600; }
    .btn-place-order { width: 100%; padding: 14px; background: #1e3c72; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 14px; transition: background 0.2s; }
    .btn-place-order:hover { background: #163070; }
    @media (max-width: 768px) { .checkout-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div id="siteHeader"></div>

<div class="checkout-wrap">
    <h2><i class="fa-solid fa-bag-shopping"></i> Checkout</h2>
    <div class="checkout-steps">
        <div class="co-step active"><div class="co-step-circle">1</div> Cart</div>
        <div class="co-step-line"></div>
        <div class="co-step active"><div class="co-step-circle">2</div> Checkout</div>
        <div class="co-step-line"></div>
        <div class="co-step"><div class="co-step-circle">3</div> Payment</div>
    </div>

    <div id="checkoutContent"></div>
</div>

<div id="siteFooter"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
function onLayoutMounted() {
    var cart = Store.cart;
    var keys = Object.keys(cart);

    if (keys.length === 0) {
        window.location.href = 'cart.html';
        return;
    }

    var grandTotal = 0;
    var itemsHTML = keys.map(function(key) {
        var item = cart[key];
        var p = getProductById(item.product_id);
        if (!p) return '';
        var subtotal = p.price * item.qty;
        grandTotal += subtotal;
        return '' +
        '<div class="co-summary-item">' +
            '<img src="' + imgUrl(p.image) + '" alt="">' +
            '<div class="co-summary-item-info"><h5>' + escapeHtml(p.name) + '</h5><span>Qty: ' + item.qty + ' &times; ₹' + fmtPrice(p.price) + '</span></div>' +
            '<div class="co-summary-item-price">₹' + fmtPrice(subtotal) + '</div>' +
        '</div>';
    }).join('');

    document.getElementById('checkoutContent').innerHTML = '' +
    '<form id="checkoutForm">' +
        '<div class="checkout-layout">' +
            '<div class="checkout-form-box">' +
                '<h3><i class="fa-solid fa-location-dot"></i> Delivery Details</h3>' +
                '<div class="co-field"><label>Delivery Address</label><textarea placeholder="Enter your full delivery address" required></textarea></div>' +
                '<div class="co-field"><label>Mobile Number</label><input type="text" placeholder="10-digit mobile number" pattern="[0-9]{10}" required></div>' +
                '<h3 style="margin-top:26px;"><i class="fa-solid fa-credit-card"></i> Payment Method</h3>' +
                '<div class="payment-options">' +
                    '<label class="pay-option"><input type="radio" name="payment_method" value="card" checked><span class="pay-icon"><i class="fa-solid fa-credit-card"></i></span><span class="pay-text">Credit / Debit Card</span></label>' +
                    '<label class="pay-option"><input type="radio" name="payment_method" value="upi"><span class="pay-icon"><i class="fa-solid fa-mobile-screen"></i></span><span class="pay-text">UPI Payment</span></label>' +
                    '<label class="pay-option"><input type="radio" name="payment_method" value="cod"><span class="pay-icon"><i class="fa-solid fa-money-bill-wave"></i></span><span class="pay-text">Cash on Delivery</span></label>' +
                '</div>' +
            '</div>' +
            '<div class="checkout-summary">' +
                '<h3>Order Summary</h3>' +
                itemsHTML +
                '<div class="summary-row"><span>Subtotal</span><span>₹' + fmtPrice(grandTotal) + '</span></div>' +
                '<div class="summary-row"><span>Shipping</span><span class="free">FREE</span></div>' +
                '<div class="summary-row total"><span>Total</span><span>₹' + fmtPrice(grandTotal) + '</span></div>' +
                '<button type="submit" class="btn-place-order"><i class="fa-solid fa-lock"></i> Place Order (Demo)</button>' +
            '</div>' +
        '</div>' +
    '</form>';

    document.getElementById('checkoutForm').addEventListener('submit', function(e) {
        e.preventDefault();
        Store.cart = {};
        window.location.href = 'order_success.html?total=' + grandTotal;
    });
}
</script>
</body>
</html>
