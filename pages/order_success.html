<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Placed | ApnaKart</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
.success-wrap { max-width: 560px; margin: 60px auto; padding: 0 20px; text-align: center; }
.success-icon { width: 90px; height: 90px; border-radius: 50%; background: #ecfdf5; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 42px; color: #059669; }
.success-wrap h2 { font-size: 22px; color: #1e293b; margin-bottom: 8px; }
.success-wrap p { font-size: 14px; color: #888; margin-bottom: 6px; }
.success-box { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 24px; margin: 24px 0; text-align: left; }
.success-box .row { display: flex; justify-content: space-between; font-size: 13px; color: #555; padding: 6px 0; }
.success-box .row strong { color: #1e293b; }
.success-actions { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
.success-actions a { padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; }
.btn-primary-success { background: #1e3c72; color: #fff; }
.btn-outline-success { border: 1.5px solid #1e3c72; color: #1e3c72; }
</style>
</head>
<body>
<div id="siteHeader"></div>

<div class="success-wrap">
    <div class="success-icon"><i class="fa-solid fa-check"></i></div>
    <h2>Order Placed Successfully!</h2>
    <p>Thank you for shopping with ApnaKart.</p>
    <div class="success-box">
        <div class="row"><span>Order ID</span><strong id="orderIdText">#AK00000</strong></div>
        <div class="row"><span>Order Total</span><strong id="orderTotalText">₹0</strong></div>
        <div class="row"><span>Payment</span><strong>Demo (no real transaction)</strong></div>
        <div class="row"><span>Status</span><strong style="color:#059669;">Confirmed</strong></div>
    </div>
    <p style="font-size:12px;color:#aaa;">This is a static demo build — no real order was processed.</p>
    <div class="success-actions">
        <a href="orders.html" class="btn-outline-success">View Orders</a>
        <a href="index.html" class="btn-primary-success">Continue Shopping</a>
    </div>
</div>

<div id="siteFooter"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
function onLayoutMounted() {
    var total = getQueryParam('total') || 0;
    document.getElementById('orderTotalText').textContent = '₹' + fmtPrice(total);
    document.getElementById('orderIdText').textContent = '#AK' + Math.floor(10000 + Math.random()*89999);
}
</script>
</body>
</html>
