<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Details | ApnaKart</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
.od-wrap { max-width: 800px; margin: 30px auto; padding: 0 20px; }
.od-wrap h2 { font-size: 20px; font-weight: 700; color: #1e3c72; margin-bottom: 18px; }
.od-box { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 24px; margin-bottom: 16px; }
.od-meta-row { display: flex; justify-content: space-between; font-size: 13px; color: #555; padding: 6px 0; border-bottom: 1px solid #f8fafc; }
.od-meta-row strong { color: #1e293b; }
.od-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid #f8fafc; align-items: center; }
.od-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
.od-item-info h4 { font-size: 13px; margin: 0 0 4px; }
.od-item-info span { font-size: 12px; color: #888; }
.od-total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; color: #1e3c72; padding-top: 12px; }
.back-link { font-size: 13px; color: #1e3c72; text-decoration: none; display: inline-block; margin-bottom: 16px; }
</style>
</head>
<body>
<div id="siteHeader"></div>

<div class="od-wrap">
    <a href="orders.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Orders</a>
    <h2 id="odTitle">Order Details</h2>
    <div id="odContent"></div>
</div>

<div id="siteFooter"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
function onLayoutMounted() {
    var sampleOrders = {
        'AK10234': { date: '12 Jun 2026', status: 'Delivered', productIds: [1,2,3], address: '221B, MG Road, Ahmedabad, Gujarat - 380001', payment: 'UPI' },
        'AK10198': { date: '02 Jun 2026', status: 'Shipped', productIds: [4,5], address: '221B, MG Road, Ahmedabad, Gujarat - 380001', payment: 'Card' },
        'AK10142': { date: '21 May 2026', status: 'Processing', productIds: [6,7,8], address: '221B, MG Road, Ahmedabad, Gujarat - 380001', payment: 'Cash on Delivery' }
    };
    var id = getQueryParam('id') || 'AK10234';
    var order = sampleOrders[id] || sampleOrders['AK10234'];
    document.getElementById('odTitle').textContent = 'Order #' + id;

    var products = order.productIds.map(getProductById).filter(Boolean);
    var total = products.reduce(function(sum, p){ return sum + p.price; }, 0);

    var itemsHTML = products.map(function(p) {
        return '<div class="od-item"><img src="' + imgUrl(p.image) + '" alt=""><div class="od-item-info"><h4>' + escapeHtml(p.name) + '</h4><span>₹' + fmtPrice(p.price) + '</span></div></div>';
    }).join('');

    document.getElementById('odContent').innerHTML = '' +
    '<div class="od-box">' +
        '<div class="od-meta-row"><span>Order Date</span><strong>' + order.date + '</strong></div>' +
        '<div class="od-meta-row"><span>Status</span><strong>' + order.status + '</strong></div>' +
        '<div class="od-meta-row"><span>Payment Method</span><strong>' + order.payment + '</strong></div>' +
        '<div class="od-meta-row"><span>Delivery Address</span><strong>' + order.address + '</strong></div>' +
    '</div>' +
    '<div class="od-box">' +
        itemsHTML +
        '<div class="od-total-row"><span>Total</span><span>₹' + fmtPrice(total) + '</span></div>' +
    '</div>';
}
</script>
</body>
</html>
