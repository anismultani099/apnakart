<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Details | ApnaKart Admin</title>
<link rel="stylesheet" href="../../assets/css/admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
.adm-wrap { padding: 28px 30px; background: #f4f6fb; min-height: calc(100vh - 70px); max-width: 800px; margin: 0 auto; }
.back-link { font-size: 13px; color: #1e3c72; text-decoration: none; display: inline-block; margin-bottom: 16px; }
.od-box { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 24px; margin-bottom: 16px; }
.od-meta-row { display: flex; justify-content: space-between; font-size: 13px; color: #555; padding: 6px 0; border-bottom: 1px solid #f8fafc; }
.od-meta-row strong { color: #1e293b; }
.od-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid #f8fafc; align-items: center; }
.od-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
.od-item-info h4 { font-size: 13px; margin: 0 0 4px; }
.od-item-info span { font-size: 12px; color: #888; }
.od-total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; color: #1e3c72; padding-top: 12px; }
.status-update-row { display: flex; gap: 10px; align-items: center; margin-top: 16px; }
.status-update-row select { padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; }
.status-update-row button { background: #1e3c72; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body data-admin-active="orders">
<div id="adminHeader"></div>

<div class="adm-wrap">
    <a href="admin_orders.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Orders</a>
    <h2 id="odTitle" style="color:#1e3c72;">Order Details</h2>
    <div id="odContent"></div>
</div>

<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
function onAdminLayoutMounted() {
    if (!requireAdminLogin()) return;
    var id = getQueryParam('id') || '312';
    document.getElementById('odTitle').textContent = 'Order #' + id;

    var products = PRODUCTS.slice(0, 3);
    var total = products.reduce(function(sum, p){ return sum + p.price; }, 0);

    var itemsHTML = products.map(function(p) {
        return '<div class="od-item"><img src="' + imgUrl(p.image) + '" alt=""><div class="od-item-info"><h4>' + escapeHtml(p.name) + '</h4><span>₹' + fmtPrice(p.price) + '</span></div></div>';
    }).join('');

    document.getElementById('odContent').innerHTML = '' +
    '<div class="od-box">' +
        '<div class="od-meta-row"><span>Customer</span><strong>Rahul Sharma</strong></div>' +
        '<div class="od-meta-row"><span>Order Date</span><strong>23 Jun 2026, 10:15 AM</strong></div>' +
        '<div class="od-meta-row"><span>Payment Method</span><strong>UPI</strong></div>' +
        '<div class="od-meta-row"><span>Delivery Address</span><strong>221B, MG Road, Ahmedabad, Gujarat - 380001</strong></div>' +
    '</div>' +
    '<div class="od-box">' +
        itemsHTML +
        '<div class="od-total-row"><span>Total</span><span>₹' + fmtPrice(total) + '</span></div>' +
        '<div class="status-update-row">' +
            '<select id="statusSelect">' +
                '<option>Pending</option><option>Confirmed</option><option>Shipped</option><option>Delivered</option><option>Cancelled</option>' +
            '</select>' +
            '<button onclick="showToast(\'Demo mode: Status update disabled\')">Update Status</button>' +
        '</div>' +
    '</div>';
}
</script>
</body>
</html>
