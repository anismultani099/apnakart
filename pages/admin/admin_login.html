<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | ApnaKart</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
.admin-login-box { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
.admin-login-box h2 { text-align: center; color: #1e3c72; font-size: 22px; margin: 0 0 6px; }
.admin-login-box p.sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
.admin-login-box input { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; margin-bottom: 14px; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
.admin-login-box button { width: 100%; padding: 13px; background: #1e3c72; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
.demo-info { background: #f0f4ff; color: #1e3c72; padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="admin-login-box">
    <h2><i class="fa-solid fa-user-shield"></i> Admin Login</h2>
    <p class="sub">ApnaKart Admin Panel</p>
    <div class="demo-info"><i class="fa-solid fa-circle-info"></i> Demo mode: any email/password logs you in.</div>
    <form id="adminLoginForm">
        <input type="email" placeholder="Admin Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    adminDemoLogin();
    window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
