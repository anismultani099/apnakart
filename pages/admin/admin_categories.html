<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Categories | ApnaKart Admin</title>
<link rel="stylesheet" href="../../assets/css/admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
.adm-wrap { padding: 28px 30px; background: #f4f6fb; min-height: calc(100vh - 70px); }
.adm-head-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.adm-head-row h2 { font-size: 20px; color: #1e3c72; font-weight: 700; margin: 0; }
.btn-add-new { background: #1e3c72; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.demo-banner { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; font-size: 12px; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.cat-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 18px 20px; }
.cat-card h3 { font-size: 15px; color: #1e3c72; margin: 0 0 12px; display: flex; justify-content: space-between; align-items: center; }
.cat-card .cat-count { font-size: 11px; background: #f0f4ff; color: #1e3c72; padding: 2px 10px; border-radius: 10px; font-weight: 700; }
.sub-cat-pill { display: inline-flex; align-items: center; gap: 6px; background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 8px; padding: 6px 10px; font-size: 12px; color: #555; margin: 4px 4px 0 0; }
.sub-cat-pill button { border: none; background: none; cursor: pointer; color: #dc2626; font-size: 11px; }
</style>
</head>
<body data-admin-active="categories">
<div id="adminHeader"></div>

<div class="adm-wrap">
    <div class="demo-banner"><i class="fa-solid fa-circle-info"></i> Demo mode — Add / Edit / Delete actions are for UI showcase only and won't persist data.</div>
    <div class="adm-head-row">
        <h2><i class="fa-solid fa-layer-group"></i> Manage Categories</h2>
        <button class="btn-add-new" onclick="showToast('Demo mode: Add Category disabled')"><i class="fa-solid fa-plus"></i> Add Category</button>
    </div>
    <div class="cat-grid" id="catGrid"></div>
</div>

<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
function onAdminLayoutMounted() {
    if (!requireAdminLogin()) return;
    var parents = getParentCategories();
    document.getElementById('catGrid').innerHTML = parents.map(function(parent) {
        var children = getChildCategories(parent.id);
        var count = PRODUCTS.filter(function(p) {
            return children.some(function(c){ return c.id === p.category_id; });
        }).length;
        var subHTML = children.map(function(c) {
            return '<span class="sub-cat-pill">' + escapeHtml(c.name) + ' <button onclick="showToast(\'Demo mode: Delete disabled\')"><i class="fa-solid fa-xmark"></i></button></span>';
        }).join('');
        return '<div class="cat-card"><h3>' + escapeHtml(parent.name) + ' <span class="cat-count">' + count + ' products</span></h3>' + subHTML + '</div>';
    }).join('');
}
</script>
</body>
</html>
