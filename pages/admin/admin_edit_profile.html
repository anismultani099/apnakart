<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile | ApnaKart Admin</title>
<link rel="stylesheet" href="../../assets/css/admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
.adm-wrap { padding: 28px 30px; background: #f4f6fb; min-height: calc(100vh - 70px); display: flex; justify-content: center; }
.profile-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 30px; max-width: 420px; width: 100%; }
.back-link { font-size: 13px; color: #1e3c72; text-decoration: none; display: block; margin-bottom: 16px; }
.co-field { margin-bottom: 18px; }
.co-field label { display: block; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 8px; }
.co-field input { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
.btn-save-profile { width: 100%; padding: 13px; background: #1e3c72; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body data-admin-active="">
<div id="adminHeader"></div>

<div class="adm-wrap">
    <div class="profile-card">
        <a href="admin_profile.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Profile</a>
        <h2 style="color:#1e3c72; font-size:18px; margin-bottom:18px;"><i class="fa-solid fa-pen"></i> Edit Profile</h2>
        <form id="adminEditForm">
            <div class="co-field"><label>Full Name</label><input type="text" value="Admin" required></div>
            <div class="co-field"><label>Email</label><input type="email" value="admin@apnakart.com" required></div>
            <div class="co-field"><label>Mobile</label><input type="text" value="9000000000"></div>
            <button type="submit" class="btn-save-profile">Save Changes</button>
        </form>
    </div>
</div>

<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
function onAdminLayoutMounted() {
    if (!requireAdminLogin()) return;
    document.getElementById('adminEditForm').addEventListener('submit', function(e) {
        e.preventDefault();
        showToast('Profile updated (demo)');
        setTimeout(function(){ window.location.href = 'admin_profile.html'; }, 600);
    });
}
</script>
</body>
</html>
